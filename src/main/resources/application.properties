spring.application.name=mailsender

# RabbitMQ Listener Control (Anti-Spam / Rate Limiting)
# Processa 2 e-mails por vez, no máximo 5 em paralelo.
spring.rabbitmq.listener.simple.concurrency=2
spring.rabbitmq.listener.simple.max-concurrency=5
# Garante que o consumidor pegue apenas 1 mensagem por vez do broker
spring.rabbitmq.listener.simple.prefetch=1

# MinIO / S3 Configuration
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin

# Spring Mail (Exemplo para Mailtrap/SMTP local)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.default-encoding=UTF-8
spring.mail.from=jaymesanches@gmail.com
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=jaymesanches@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:mailsenderdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
